<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Scheduler</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            margin: 0;
            padding: 20px;
            color: #f1f5f9;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { margin: 0; font-size: 1.8rem; background: linear-gradient(135deg, #2dd4bf, #38bdf8); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .role-selector {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        .role-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .role-btn.active {
            background: #2dd4bf;
            color: #0f172a;
            border-color: #2dd4bf;
        }
        .dashboard {
            background: rgba(255,255,255,0.03);
            border-radius: 1.5rem;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .slots-grid, .bookings-list, .users-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .slot-card, .booking-card, .user-card {
            background: rgba(255,255,255,0.05);
            border-radius: 1rem;
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }
        .slot-card-details, .user-details {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
        }
        button {
            background: #2dd4bf;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: bold;
            color: #0f172a;
        }
        button.danger { background: #ef4444; color: white; }
        button.success { background: #10b981; color: white; }
        button.warning { background: #f59e0b; color: white; }
        button.secondary { background: #475569; color: white; }
        select, input {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 0.5rem;
            border-radius: 0.5rem;
            color: white;
        }
        .form-group { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
        .zoom-link { font-size: 0.8rem; color: #38bdf8; word-break: break-all; }
        .status { padding: 0.25rem 0.75rem; border-radius: 1rem; font-size: 0.8rem; display: inline-block; }
        .status.pending { background: #f59e0b; }
        .status.confirmed { background: #10b981; }
        .status.free { background: #3b82f6; }
        .status.booked { background: #8b5cf6; }
        h2 { font-size: 1.3rem; margin: 0 0 1rem 0; }
        h3 { font-size: 1.1rem; margin: 1rem 0 0.5rem 0; color: #94a3b8; }
        hr { border-color: rgba(255,255,255,0.1); margin: 1rem 0; }
        .filter-bar { margin-bottom: 1.5rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem; }
        .tab { padding: 0.5rem 1rem; cursor: pointer; border-radius: 0.5rem; }
        .tab.active { background: rgba(45,212,191,0.2); color: #2dd4bf; }
        .badge { font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 1rem; background: rgba(255,255,255,0.1); }
        .user-active { color: #10b981; }
        .user-inactive { color: #ef4444; }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📅 Expert Scheduler — Система управления расписанием</h1>
        <div class="role-selector">
            <div class="role-btn" data-role="manager">📋 Менеджер</div>
            <div class="role-btn" data-role="expert">🎯 Эксперт</div>
            <div class="role-btn" data-role="admin">👑 Администратор</div>
        </div>
        <div class="form-group" id="user-info" style="margin-top: 1rem;">
            <input type="text" id="user-name" placeholder="Ваше имя">
            <input type="email" id="user-email" placeholder="Email">
            <button id="register-btn">Зарегистрироваться / Войти</button>
            <button id="logout-btn" class="secondary" style="display:none;">🚪 Выйти</button>
        </div>
        <div id="current-user" style="margin-top: 0.5rem; font-size: 0.9rem; color: #94a3b8;"></div>
    </div>

    <div class="dashboard" id="dashboard">
        <div style="text-align: center; padding: 3rem;">Выберите роль и зарегистрируйтесь</div>
    </div>
</div>

<script>
    const API_URL = window.location.origin;
    let currentUser = null;
    let currentRole = 'manager';
    let adminActiveTab = 'slots';
    
    function loadFromStorage() {
        const saved = localStorage.getItem('expert_scheduler_user');
        if (saved) {
            try {
                const user = JSON.parse(saved);
                currentUser = user;
                currentRole = user.role;
                document.getElementById('current-user').innerHTML = `✅ Вы вошли как <strong>${user.name}</strong> (${user.role})`;
                document.getElementById('logout-btn').style.display = 'inline-block';
                document.querySelectorAll('.role-btn').forEach(btn => {
                    if (btn.dataset.role === user.role) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
                document.getElementById('user-name').value = user.name;
                document.getElementById('user-email').value = user.email;
                loadDashboard();
            } catch(e) {}
        }
    }
    
    function saveToStorage(user) {
        localStorage.setItem('expert_scheduler_user', JSON.stringify(user));
    }
    
    function clearStorage() {
        localStorage.removeItem('expert_scheduler_user');
        currentUser = null;
        document.getElementById('logout-btn').style.display = 'none';
        document.getElementById('current-user').innerHTML = '';
        document.getElementById('user-name').value = '';
        document.getElementById('user-email').value = '';
        dashboardDiv.innerHTML = '<div style="text-align: center; padding: 3rem;">Выберите роль и зарегистрируйтесь</div>';
    }
    
    document.getElementById('logout-btn').addEventListener('click', () => {
        clearStorage();
        location.reload();
    });
    
    const roleBtns = document.querySelectorAll('.role-btn');
    const registerBtn = document.getElementById('register-btn');
    const dashboardDiv = document.getElementById('dashboard');
    
    roleBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            if (currentUser) {
                alert(`Вы уже вошли как ${currentUser.role}. Для смены роли выйдите.`);
                return;
            }
            roleBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentRole = btn.dataset.role;
        });
    });
    
    registerBtn.addEventListener('click', async () => {
        const name = document.getElementById('user-name').value;
        const email = document.getElementById('user-email').value;
        
        if (!name || !email) {
            alert("Введите имя и email");
            return;
        }
        
        try {
            const response = await fetch(`${API_URL}/api/users`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, role: currentRole })
            });
            
            if (!response.ok) {
                const error = await response.json();
                alert(error.detail || "Ошибка регистрации");
                return;
            }
            
            const user = await response.json();
            currentUser = user;
            saveToStorage(user);
            document.getElementById('current-user').innerHTML = `✅ Вы вошли как <strong>${user.name}</strong> (${user.role})`;
            document.getElementById('logout-btn').style.display = 'inline-block';
            loadDashboard();
        } catch (err) {
            console.error(err);
            alert('Ошибка соединения с сервером');
        }
    });
    
    async function loadDashboard() {
        if (!currentUser) return;
        
        if (currentUser.role === 'manager') {
            await loadManagerView();
        } else if (currentUser.role === 'expert') {
            await loadExpertView();
        } else if (currentUser.role === 'admin') {
            await loadAdminView();
        }
    }
    
    async function loadManagerView() {
        const slotsRes = await fetch(`${API_URL}/api/slots/free`);
        const freeSlots = await slotsRes.json();
        
        const bookingsRes = await fetch(`${API_URL}/api/bookings?role=manager&user_id=${currentUser.id}`);
        const myBookings = await bookingsRes.json();
        
        let html = `<h2>📅 Свободные слоты для записи</h2><div class="slots-grid">`;
        if (freeSlots.length === 0) html += `<p>Нет свободных слотов</p>`;
        freeSlots.forEach(slot => {
            html += `
                <div class="slot-card">
                    <div class="slot-card-details">
                        <strong>${slot.expert_name}</strong><br>
                        📆 ${slot.date} | ⏰ ${slot.start_time} - ${slot.end_time}
                    </div>
                    <button onclick="bookSlot('${slot.id}')">📝 Записать клиента</button>
                </div>
            `;
        });
        html += `</div><hr><h2>📋 Мои записи (клиенты)</h2><div class="bookings-list">`;
        if (myBookings.length === 0) html += `<p>Нет записей</p>`;
        myBookings.forEach(b => {
            html += `
                <div class="booking-card">
                    <div class="slot-card-details">
                        <strong>${b.client_name}</strong> → ${b.expert_name}<br>
                        📆 ${b.date} ${b.start_time}<br>
                        Статус: <span class="status ${b.status}">${b.status}</span><br>
                        <div class="zoom-link">🔗 ${b.zoom_link}</div>
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        dashboardDiv.innerHTML = html;
    }
    
    window.bookSlot = async (slotId) => {
        const clientName = prompt("Введите ФИО клиента:");
        if (!clientName) return;
        const clientPhone = prompt("Введите телефон клиента (опционально):");
        const clientEmail = prompt("Введите email клиента (опционально):");
        
        const response = await fetch(`${API_URL}/api/bookings`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                slot_id: slotId,
                manager_id: currentUser.id,
                client_name: clientName,
                client_phone: clientPhone || "",
                client_email: clientEmail || ""
            })
        });
        
        if (response.ok) {
            alert("Клиент успешно записан! Ссылка Zoom сгенерирована.");
            loadDashboard();
        } else {
            alert("Ошибка записи. Возможно, слот уже занят.");
        }
    };
    
    async function loadExpertView() {
        const slotsRes = await fetch(`${API_URL}/api/slots?expert_id=${currentUser.id}`);
        let mySlots = await slotsRes.json();
        
        const bookingsRes = await fetch(`${API_URL}/api/bookings?role=expert&user_id=${currentUser.id}`);
        const myBookings = await bookingsRes.json();
        
        let html = `
            <h2>🕐 Мои слоты (расписание)</h2>
            <div class="form-group">
                <input type="date" id="new-slot-date" placeholder="Дата">
                <input type="time" id="new-slot-start" placeholder="Начало">
                <input type="time" id="new-slot-end" placeholder="Конец">
                <button onclick="createSlot()">➕ Добавить слот</button>
            </div>
            <div class="slots-grid">
        `;
        if (mySlots.length === 0) html += `<p>У вас нет созданных слотов</p>`;
        mySlots.forEach(slot => {
            html += `
                <div class="slot-card">
                    <div class="slot-card-details">
                        📆 ${slot.date} | ⏰ ${slot.start_time} - ${slot.end_time}
                        Статус: <span class="status ${slot.status}">${slot.status}</span>
                    </div>
                </div>
            `;
        });
        html += `</div><hr><h2>📋 Записи клиентов на мои слоты</h2><div class="bookings-list">`;
        if (myBookings.length === 0) html += `<p>Нет записей</p>`;
        myBookings.forEach(b => {
            html += `
                <div class="booking-card">
                    <div class="slot-card-details">
                        <strong>${b.client_name}</strong> (тел: ${b.client_phone || 'не указан'})<br>
                        📆 ${b.date} ${b.start_time}<br>
                        👤 Менеджер: ${b.manager_name || 'неизвестен'}<br>
                        Статус: <span class="status ${b.status}">${b.status}</span><br>
                        <div class="zoom-link">🔗 ${b.zoom_link}</div>
                    </div>
                    ${b.status === 'pending' ? `<button class="success" onclick="confirmBooking('${b.id}')">✅ Подтвердить запись</button>` : ''}
                </div>
            `;
        });
        html += `</div>`;
        dashboardDiv.innerHTML = html;
    }
    
    window.createSlot = async () => {
        const date = document.getElementById('new-slot-date').value;
        const start = document.getElementById('new-slot-start').value;
        const end = document.getElementById('new-slot-end').value;
        
        if (!date || !start || !end) {
            alert("Заполните дату, начало и конец");
            return;
        }
        
        const response = await fetch(`${API_URL}/api/slots`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                expert_id: currentUser.id,
                date: date,
                start_time: start,
                end_time: end
            })
        });
        
        if (response.ok) {
            alert("Слот создан");
            loadDashboard();
        } else {
            alert("Ошибка создания слота");
        }
    };
    
    window.confirmBooking = async (bookingId) => {
        const response = await fetch(`${API_URL}/api/bookings/confirm`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                booking_id: bookingId,
                expert_id: currentUser.id
            })
        });
        
        if (response.ok) {
            alert("Запись подтверждена!");
            loadDashboard();
        } else {
            alert("Ошибка подтверждения");
        }
    };
    
    // ========== АДМИН-ПАНЕЛЬ С УПРАВЛЕНИЕМ ПОЛЬЗОВАТЕЛЯМИ ==========
    
    async function loadAdminView() {
        let html = `
            <h2>👑 Административная панель</h2>
            <div class="tabs">
                <div class="tab ${adminActiveTab === 'slots' ? 'active' : ''}" onclick="switchAdminTab('slots')">📅 Слоты экспертов</div>
                <div class="tab ${adminActiveTab === 'bookings' ? 'active' : ''}" onclick="switchAdminTab('bookings')">📋 Все записи</div>
                <div class="tab ${adminActiveTab === 'users' ? 'active' : ''}" onclick="switchAdminTab('users')">👥 Управление пользователями</div>
            </div>
            <div id="admin-tab-content"></div>
        `;
        dashboardDiv.innerHTML = html;
        
        if (adminActiveTab === 'slots') await renderAdminSlots();
        else if (adminActiveTab === 'bookings') await renderAdminBookings();
        else if (adminActiveTab === 'users') await renderAdminUsers();
    }
    
    window.switchAdminTab = (tab) => {
        adminActiveTab = tab;
        loadAdminView();
    };
    
    async function renderAdminSlots() {
        const usersRes = await fetch(`${API_URL}/api/users`);
        const allUsers = await usersRes.json();
        const experts = allUsers.filter(u => u.role === 'expert' && u.is_active !== false);
        
        const slotsRes = await fetch(`${API_URL}/api/slots/admin/all`);
        let allSlots = await slotsRes.json();
        
        let html = `
            <div class="filter-bar">
                <label>👨‍🏫 Фильтр по эксперту:</label>
                <select id="expert-filter">
                    <option value="all">Все эксперты</option>
                    ${experts.map(e => `<option value="${e.id}">${e.name} (${e.email})</option>`).join('')}
                </select>
                <button onclick="filterSlots()">Применить фильтр</button>
            </div>
            <div class="slots-grid" id="slots-container">
        `;
        
        window.adminSlotsData = allSlots;
        html += `<div id="slots-list">${renderSlotsList(allSlots)}</div>`;
        html += `</div>`;
        document.getElementById('admin-tab-content').innerHTML = html;
    }
    
    function renderSlotsList(slots) {
        if (slots.length === 0) return `<p>Нет слотов</p>`;
        return slots.map(slot => `
            <div class="slot-card">
                <div class="slot-card-details">
                    <strong>${slot.expert_name}</strong> (${slot.expert_email})<br>
                    📆 ${slot.date} | ⏰ ${slot.start_time} - ${slot.end_time}<br>
                    Статус: <span class="status ${slot.status}">${slot.status}</span>
                    ${slot.booking ? `
                        <br><br>
                        <strong>📌 Запись клиента:</strong><br>
                        👤 Клиент: ${slot.booking.client_name}<br>
                        📞 Телефон: ${slot.booking.client_phone || 'не указан'}<br>
                        📧 Email клиента: ${slot.booking.client_email || 'не указан'}<br>
                        👨‍💼 Менеджер: ${slot.booking.manager_name}<br>
                        🔗 <a href="${slot.booking.zoom_link}" target="_blank">Zoom ссылка</a>
                    ` : ''}
                </div>
            </div>
        `).join('');
    }
    
    window.filterSlots = () => {
        const expertId = document.getElementById('expert-filter').value;
        const slots = window.adminSlotsData || [];
        const filtered = expertId === 'all' ? slots : slots.filter(s => s.expert_id === expertId);
        document.getElementById('slots-list').innerHTML = renderSlotsList(filtered);
    };
    
    async function renderAdminBookings() {
        const bookingsRes = await fetch(`${API_URL}/api/bookings?role=admin&user_id=${currentUser.id}`);
        const allBookings = await bookingsRes.json();
        
        let html = `<div class="bookings-list">`;
        if (allBookings.length === 0) html += `<p>Нет записей</p>`;
        allBookings.forEach(b => {
            html += `
                <div class="booking-card">
                    <div class="slot-card-details">
                        <strong>${b.client_name}</strong> → ${b.expert_name}<br>
                        📆 ${b.date} ${b.start_time}<br>
                        👤 Менеджер: ${b.manager_name}<br>
                        📞 Телефон клиента: ${b.client_phone || 'не указан'}<br>
                        📧 Email клиента: ${b.client_email || 'не указан'}<br>
                        Статус: <span class="status ${b.status}">${b.status}</span><br>
                        <div class="zoom-link">🔗 ${b.zoom_link}</div>
                    </div>
                </div>
            `;
        });
        html += `</div>`;
        document.getElementById('admin-tab-content').innerHTML = html;
    }
    
    async function renderAdminUsers() {
        const usersRes = await fetch(`${API_URL}/api/users`);
        let allUsers = await usersRes.json();
        
        let html = `
            <div class="users-list">
                <div style="display: grid; grid-template-columns: 2fr 2fr 1fr 1fr 1.5fr 1fr; gap: 0.5rem; padding: 0.5rem; background: rgba(255,255,255,0.05); border-radius: 0.5rem; font-weight: bold;">
                    <div>Имя</div><div>Email</div><div>Роль</div><div>Статус</div><div>Действия</div><div>Удалить</div>
                </div>
        `;
        
        allUsers.forEach(user => {
            const isActive = user.is_active !== false;
            html += `
                <div class="user-card" style="display: grid; grid-template-columns: 2fr 2fr 1fr 1fr 1.5fr 1fr; gap: 0.5rem; align-items: center;">
                    <div>${escapeHtml(user.name)}</div>
                    <div>${escapeHtml(user.email)}</div>
                    <div>
                        <select class="role-select-${user.id}" ${user.id === currentUser.id ? 'disabled' : ''}>
                            <option value="manager" ${user.role === 'manager' ? 'selected' : ''}>Менеджер</option>
                            <option value="expert" ${user.role === 'expert' ? 'selected' : ''}>Эксперт</option>
                            <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Админ</option>
                        </select>
                    </div>
                    <div class="${isActive ? 'user-active' : 'user-inactive'}">${isActive ? 'Активен' : 'Заблокирован'}</div>
                    <div>
                        <button class="secondary" onclick="updateUser('${user.id}', '${user.role === 'admin' ? 'admin' : user.role}')" style="margin-right: 0.5rem;">💾 Сохранить</button>
                        <button class="warning" onclick="toggleBlockUser('${user.id}', ${!isActive})">${isActive ? '🔒 Заблокировать' : '🔓 Разблокировать'}</button>
                    </div>
                    <div>
                        ${user.id !== currentUser.id ? `<button class="danger" onclick="deleteUser('${user.id}', '${user.role}')">🗑 Удалить</button>` : '<span class="badge">Вы</span>'}
                    </div>
                </div>
            `;
        });
        
        html += `</div><p class="badge" style="margin-top: 1rem;">⚠️ Изменение роли последнего администратора недоступно для защиты системы.</p>`;
        document.getElementById('admin-tab-content').innerHTML = html;
    }
    
    window.updateUser = async (userId, currentRole) => {
        const select = document.querySelector(`.role-select-${userId}`);
        if (!select) return;
        const newRole = select.value;
        
        if (newRole === currentRole) {
            alert("Роль не изменена");
            return;
        }
        
        if (!confirm(`Изменить роль пользователя на "${newRole}"?`)) return;
        
        const response = await fetch(`${API_URL}/api/users`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: userId, role: newRole })
        });
        
        if (response.ok) {
            alert("Роль обновлена!");
            renderAdminUsers();
        } else {
            const error = await response.json();
            alert(error.detail || "Ошибка обновления роли");
        }
    };
    
    window.toggleBlockUser = async (userId, unblock) => {
        const action = unblock ? 'разблокировать' : 'заблокировать';
        if (!confirm(`Вы уверены, что хотите ${action} этого пользователя?`)) return;
        
        const response = await fetch(`${API_URL}/api/users`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: userId, is_active: unblock })
        });
        
        if (response.ok) {
            alert(unblock ? "Пользователь разблокирован" : "Пользователь заблокирован");
            renderAdminUsers();
        } else {
            const error = await response.json();
            alert(error.detail || "Ошибка");
        }
    };
    
    window.deleteUser = async (userId, role) => {
        if (!confirm(`Удалить пользователя? Все его слоты (если эксперт) будут удалены.`)) return;
        
        const response = await fetch(`${API_URL}/api/users/${userId}`, {
            method: 'DELETE'
        });
        
        if (response.ok) {
            alert("Пользователь удалён");
            if (currentUser && currentUser.id === userId) {
                clearStorage();
                location.reload();
            } else {
                renderAdminUsers();
            }
        } else {
            const error = await response.json();
            alert(error.detail || "Ошибка удаления");
        }
    };
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    loadFromStorage();
</script>
</body>
</html>
