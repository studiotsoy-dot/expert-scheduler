<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert Scheduler CRM</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            margin: 0;
            padding: 20px;
            color: #f1f5f9;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        .header {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            padding: 1.5rem 2rem;
            margin-bottom: 2rem;
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { margin: 0; font-size: 1.8rem; background: linear-gradient(135deg, #2dd4bf, #38bdf8); -webkit-background-clip: text; background-clip: text; color: transparent; }
        .role-selector {
            display: flex;
            gap: 1rem;
            margin-top: 1rem;
            flex-wrap: wrap;
        }
        .role-btn {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            padding: 0.5rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .role-btn.active {
            background: #2dd4bf;
            color: #0f172a;
            border-color: #2dd4bf;
        }
        .role-btn.admin-hidden {
            display: none;
        }
        .dashboard {
            background: rgba(255,255,255,0.03);
            border-radius: 1.5rem;
            padding: 1.5rem;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .form-group { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-top: 1rem; }
        button {
            background: #2dd4bf;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: bold;
            color: #0f172a;
            transition: all 0.2s;
        }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        button.danger { background: #ef4444; color: white; }
        button.success { background: #10b981; color: white; }
        button.warning { background: #f59e0b; color: white; }
        button.secondary { background: #475569; color: white; }
        button.info { background: #3b82f6; color: white; }
        select, input, textarea {
            background: #1e293b;
            border: 1px solid #475569;
            padding: 0.5rem;
            border-radius: 0.5rem;
            color: #f1f5f9;
        }
        input[type="date"]::-webkit-calendar-picker-indicator,
        input[type="time"]::-webkit-calendar-picker-indicator {
            filter: invert(1);
            cursor: pointer;
        }
        select option {
            background: #1e293b;
            color: #f1f5f9;
        }
        textarea { font-family: inherit; resize: vertical; width: 100%; }
        .zoom-link { font-size: 0.75rem; color: #38bdf8; word-break: break-all; }
        .status { padding: 0.2rem 0.6rem; border-radius: 1rem; font-size: 0.7rem; display: inline-block; font-weight: bold; }
        .status-pending { background: #f59e0b; color: #1a1a2e; }
        .status-confirmed { background: #10b981; color: white; }
        .status-success { background: #06b6d4; color: white; }
        .status-cancelled_by_client { background: #ef4444; color: white; }
        .status-cancelled_by_expert { background: #f97316; color: white; }
        .status-failed { background: #7c3aed; color: white; }
        .status-reschedule_request { background: #ec4899; color: white; }
        .status-free { background: #3b82f6; color: white; }
        .status-booked { background: #8b5cf6; color: white; }
        h2 { font-size: 1.3rem; margin: 0 0 1rem 0; }
        hr { border-color: rgba(255,255,255,0.1); margin: 1rem 0; }
        .filter-bar { margin-bottom: 1rem; display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; }
        .tabs { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem; flex-wrap: wrap; }
        .tab { padding: 0.5rem 1rem; cursor: pointer; border-radius: 0.5rem; }
        .tab.active { background: rgba(45,212,191,0.2); color: #2dd4bf; }
        .badge { font-size: 0.7rem; padding: 0.2rem 0.5rem; border-radius: 1rem; background: rgba(255,255,255,0.1); }
        .user-active { color: #10b981; }
        .user-inactive { color: #ef4444; }
        
        .data-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }
        .data-table th {
            text-align: left;
            padding: 0.75rem 0.5rem;
            background: rgba(255,255,255,0.05);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-weight: 600;
            color: #94a3b8;
        }
        .data-table td {
            padding: 0.6rem 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            vertical-align: middle;
        }
        .data-table tr:hover { background: rgba(255,255,255,0.03); }
        .text-muted { color: #94a3b8; font-size: 0.75rem; }
        
        @keyframes highlight {
            0% { background: rgba(45,212,191,0.4); }
            100% { background: transparent; }
        }
        .highlight-row {
            animation: highlight 2s ease-out;
        }
        
        .users-table {
            display: grid;
            grid-template-columns: 1.5fr 1.5fr 0.8fr 0.8fr 1.2fr 0.8fr;
            gap: 0.5rem;
            align-items: center;
            padding: 0.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .users-header {
            background: rgba(255,255,255,0.05);
            border-radius: 0.5rem;
            font-weight: bold;
            color: #94a3b8;
            margin-bottom: 0.5rem;
        }
        .action-buttons {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        /* Модальное окно */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #1e293b;
            border-radius: 1rem;
            padding: 1.5rem;
            min-width: 400px;
            max-width: 500px;
            border: 1px solid #475569;
        }
        .modal-content h3 {
            margin-top: 0;
        }
        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
            margin-top: 1rem;
        }
        .admin-hint {
            font-size: 0.7rem;
            color: #f59e0b;
            margin-top: 0.5rem;
        }
        .clickable-name {
            color: #2dd4bf;
            text-decoration: none;
            font-weight: 600;
        }
        .clickable-name:hover {
            text-decoration: underline;
        }
                /* Футер и логотип разработчика */
        .footer {
            margin-top: 2rem;
            text-align: center;
            padding: 1.5rem;
            font-size: 0.8rem;
            color: #64748b;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .dev-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            color: #64748b;
            text-decoration: none;
            transition: all 0.2s ease;
            font-weight: 500;
        }
        .dev-logo:hover {
            color: #2dd4bf;
        }
        .footer-logo {
            height: 28px;
            width: auto;
            vertical-align: middle;
            border-radius: 4px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>📅 Expert Scheduler CRM</h1>
        <div class="role-selector" id="role-selector">
            <div class="role-btn" data-role="manager">📋 Менеджер</div>
            <div class="role-btn" data-role="expert">🎯 Эксперт</div>
            <!-- Админ скрыт по умолчанию, появляется только для специального email -->
            <div class="role-btn admin-hidden" data-role="admin" id="admin-role-btn">👑 Администратор</div>
        </div>
        <div class="form-group" id="user-info" style="margin-top: 1rem;">
            <input type="text" id="user-name" placeholder="Ваше имя">
            <input type="email" id="user-email" placeholder="Email">
            <button id="register-btn">Зарегистрироваться / Войти</button>
            <button id="logout-btn" class="secondary" style="display:none;">🚪 Выйти</button>
        </div>
        <div id="current-user" style="margin-top: 0.5rem; font-size: 0.9rem; color: #94a3b8;"></div>
        <div id="admin-hint" class="admin-hint" style="display: none;">🔐 Для входа как администратор используйте email: studiotsoy@gmail.com</div>
    </div>

    <div class="dashboard" id="dashboard">
        <div style="text-align: center; padding: 3rem;">Выберите роль и зарегистрируйтесь</div>
    </div>
</div>

<!-- Модальное окно для комментария -->
<div id="status-modal" class="modal">
    <div class="modal-content">
        <h3>📝 Комментарий к статусу</h3>
        <p>Вы меняете статус на: <strong id="modal-status-name"></strong></p>
        <textarea id="modal-comment" rows="3" placeholder="Введите комментарий..."></textarea>
        <div class="modal-buttons">
            <button id="modal-cancel" class="secondary">Отмена</button>
            <button id="modal-confirm" class="success">Подтвердить</button>
        </div>
    </div>
</div>

<script>
    const API_URL = window.location.origin;
    let currentUser = null;
    let currentRole = 'manager';
    let adminActiveTab = 'slots';
    let statusNames = {};
    let pendingStatusUpdate = null;
    
    // Разрешённый email для админа
    const ADMIN_EMAIL = "studiotsoy@gmail.com";
    
    async function loadStatuses() {
        try {
            const res = await fetch(`${API_URL}/api/bookings/statuses`);
            const data = await res.json();
            statusNames = data.names;
        } catch(e) { console.error(e); }
    }
    
    function getStatusClass(status) {
        const classes = {
            'free': 'status-free',
            'booked': 'status-booked',
            'pending': 'status-pending',
            'confirmed': 'status-confirmed',
            'success': 'status-success',
            'cancelled_by_client': 'status-cancelled_by_client',
            'cancelled_by_expert': 'status-cancelled_by_expert',
            'failed': 'status-failed',
            'reschedule_request': 'status-reschedule_request'
        };
        return classes[status] || 'status-pending';
    }
    
    function getStatusName(status) {
        return statusNames[status] || status;
    }
    
    function checkAdminAccess(email) {
        const adminBtn = document.getElementById('admin-role-btn');
        if (email === ADMIN_EMAIL) {
            adminBtn.style.display = 'inline-block';
            document.getElementById('admin-hint').style.display = 'block';
        } else {
            adminBtn.style.display = 'none';
            document.getElementById('admin-hint').style.display = 'none';
            // Если текущая роль админ, но email не тот — сбрасываем
            if (currentRole === 'admin') {
                currentRole = 'manager';
                document.querySelectorAll('.role-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if (btn.dataset.role === 'manager') btn.classList.add('active');
                });
            }
        }
    }
    
    function loadFromStorage() {
        const saved = localStorage.getItem('expert_scheduler_user');
        if (saved) {
            try {
                const user = JSON.parse(saved);
                currentUser = user;
                currentRole = user.role;
                checkAdminAccess(user.email);
                document.getElementById('current-user').innerHTML = `✅ Вы вошли как <strong>${user.name}</strong> (${user.role})`;
                document.getElementById('logout-btn').style.display = 'inline-block';
                document.querySelectorAll('.role-btn').forEach(btn => {
                    if (btn.dataset.role === user.role) {
                        btn.classList.add('active');
                    } else {
                        btn.classList.remove('active');
                    }
                });
                document.getElementById('user-name').value = user.name;
                document.getElementById('user-email').value = user.email;
                loadDashboard();
            } catch(e) {}
        }
    }
    
    function saveToStorage(user) {
        localStorage.setItem('expert_scheduler_user', JSON.stringify(user));
    }
    
    function clearStorage() {
        localStorage.removeItem('expert_scheduler_user');
        currentUser = null;
        document.getElementById('logout-btn').style.display = 'none';
        document.getElementById('current-user').innerHTML = '';
        document.getElementById('user-name').value = '';
        document.getElementById('user-email').value = '';
        dashboardDiv.innerHTML = '<div style="text-align: center; padding: 3rem;">Выберите роль и зарегистрируйтесь</div>';
    }
    
    document.getElementById('logout-btn').addEventListener('click', () => {
        clearStorage();
        location.reload();
    });
    
    const roleBtns = document.querySelectorAll('.role-btn');
    const registerBtn = document.getElementById('register-btn');
    const dashboardDiv = document.getElementById('dashboard');
    
    roleBtns.forEach(btn => {
        btn.addEventListener('click', () => {
            if (currentUser) {
                alert(`Вы уже вошли как ${currentUser.role}. Для смены роли выйдите.`);
                return;
            }
            roleBtns.forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentRole = btn.dataset.role;
        });
    });
    
    registerBtn.addEventListener('click', async () => {
        const name = document.getElementById('user-name').value;
        const email = document.getElementById('user-email').value;
        
        if (!name || !email) {
            alert("Введите имя и email");
            return;
        }
        
        // Проверка: если пытаются зарегистрироваться админом без специального email
        if (currentRole === 'admin' && email !== ADMIN_EMAIL) {
            alert("Доступ к роли Администратора разрешён только для studiotsoy@gmail.com");
            return;
        }
        
        try {
            const response = await fetch(`${API_URL}/api/users`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, role: currentRole })
            });
            
            if (!response.ok) {
                const error = await response.json();
                alert(error.detail || "Ошибка регистрации");
                return;
            }
            
            const user = await response.json();
            currentUser = user;
            saveToStorage(user);
            document.getElementById('current-user').innerHTML = `✅ Вы вошли как <strong>${user.name}</strong> (${user.role})`;
            document.getElementById('logout-btn').style.display = 'inline-block';
            loadDashboard();
        } catch (err) {
            console.error(err);
            alert('Ошибка соединения с сервером');
        }
    });
    
    // Функция для показа модального окна
    function showStatusModal(bookingId, newStatus, callback) {
        pendingStatusUpdate = { bookingId, newStatus, callback };
        document.getElementById('modal-status-name').innerText = getStatusName(newStatus);
        document.getElementById('modal-comment').value = '';
        document.getElementById('status-modal').classList.add('active');
    }
    
    document.getElementById('modal-cancel').addEventListener('click', () => {
        document.getElementById('status-modal').classList.remove('active');
        pendingStatusUpdate = null;
    });
    
    document.getElementById('modal-confirm').addEventListener('click', async () => {
        if (!pendingStatusUpdate) return;
        const { bookingId, newStatus, callback } = pendingStatusUpdate;
        const comment = document.getElementById('modal-comment').value;
        
        const response = await fetch(`${API_URL}/api/bookings/update-status`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                booking_id: bookingId,
                expert_id: currentUser.id,
                status: newStatus,
                comment: comment
            })
        });
        
        document.getElementById('status-modal').classList.remove('active');
        pendingStatusUpdate = null;
        
        if (response.ok) {
            if (callback) callback(true);
            loadDashboard();
        } else {
            alert("Ошибка обновления статуса");
            if (callback) callback(false);
        }
    });
    function sortByDateTime(items, dateField = 'date', timeField = 'start_time') {
        return items.sort((a, b) => {
            const dateA = new Date(`${a[dateField]} ${a[timeField]}`);
            const dateB = new Date(`${b[dateField]} ${b[timeField]}`);
            return dateA - dateB;
        });
    }    
    async function loadDashboard() {
        if (!currentUser) return;
        await loadStatuses();
        
        if (currentUser.role === 'manager') {
            await loadManagerView();
        } else if (currentUser.role === 'expert') {
            await loadExpertView();
        } else if (currentUser.role === 'admin') {
            await loadAdminView();
        }
    }
    
    // ========== МЕНЕДЖЕР ==========
    async function loadManagerView() {
        const slotsRes = await fetch(`${API_URL}/api/slots/free`);
        let freeSlots = await slotsRes.json();
        
        const bookingsRes = await fetch(`${API_URL}/api/bookings?role=manager&user_id=${currentUser.id}`);
        let myBookings = await bookingsRes.json();

        // Сортируем свободные слоты
        freeSlots = sortByDateTime(freeSlots, 'date', 'start_time');
        // Сортируем записи менеджера
        myBookings = sortByDateTime(myBookings, 'date', 'start_time');
        
        let html = `<h2>📅 Свободные слоты</h2>`;
        if (freeSlots.length === 0) html += `<p>Нет свободных слотов</p>`;
        else {
            html += `<table class="data-table"><thead><tr><th>Эксперт</th><th>Дата</th><th>Время</th><th></th></tr></thead><tbody>`;
            freeSlots.forEach(slot => {
               const expertPortfolio = slot.expert_portfolio || "";
               const expertDisplay = expertPortfolio ? `<a href="${expertPortfolio}" target="_blank" class="clickable-name">${slot.expert_name}</a>` : slot.expert_name;
               html += `<tr>
                 <td>${expertDisplay}</td>
                 <td>${slot.date}</td>
                 <td>${slot.start_time} - ${slot.end_time}</td>
                 <td><button onclick="bookSlot('${slot.id}')">📝 Записать</button></td>
               </tr>`;
           });
            html += `</tbody></table>`;
        }
        
        html += `<hr><h2>📋 Мои записи</h2>`;
        if (myBookings.length === 0) html += `<p>Нет записей</p>`;
        else {
            html += `<table class="data-table"><thead><tr>
                <th>Клиент</th><th>Email</th><th>Телефон</th><th>Эксперт</th><th>Дата/Время</th><th>Статус</th><th>Комментарий</th><th>Zoom</th><th></th>
            </tr></thead><tbody>`;
            myBookings.forEach(b => {
                const expertPortfolio = b.expert_portfolio || "";
                const expertDisplay = expertPortfolio ? `<a href="${expertPortfolio}" target="_blank" class="clickable-name">${b.expert_name}</a>` : b.expert_name;
                html += `<tr>
                    <td><strong>${b.client_name}</strong></td>
                    <td>${b.client_email || '—'}</td>
                    <td>${b.client_phone || '—'}</td>
                    <td>${expertDisplay}
                    <td>${b.date} ${b.start_time}
                    <td><span class="status ${getStatusClass(b.call_status)}">${getStatusName(b.call_status)}</span>
                    <td><span class="comment-preview">${b.call_comment || '—'}</span>
                    <td><a href="${b.zoom_link}" target="_blank" class="zoom-link">🔗 Zoom</a>
                    <td>${b.call_status === 'reschedule_request' ? `<button class="info" onclick="rescheduleBooking('${b.id}')">🔄 Переназначить</button>` : ''}
                </tr>`;
            });
            html += `</tbody></table>`;
        }
        dashboardDiv.innerHTML = html;
    }
    
    window.bookSlot = async (slotId) => {
        const clientName = prompt("Введите ФИО клиента:");
        if (!clientName) return;
        const clientPhone = prompt("Введите телефон клиента:");
        const clientEmail = prompt("Введите email клиента:");
        
        const response = await fetch(`${API_URL}/api/bookings`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                slot_id: slotId,
                manager_id: currentUser.id,
                client_name: clientName,
                client_phone: clientPhone || "",
                client_email: clientEmail || ""
            })
        });
        
        if (response.ok) {
            alert("Клиент успешно записан!");
            loadDashboard();
        } else {
            alert("Ошибка записи. Возможно, слот уже занят.");
        }
    };
    
    window.rescheduleBooking = async (bookingId) => {
        const newDate = prompt("Введите новую дату (ГГГГ-ММ-ДД):");
        if (!newDate) return;
        const newTime = prompt("Введите новое время начала (ЧЧ:ММ):");
        if (!newTime) return;
        const endTime = prompt("Введите новое время окончания (ЧЧ:ММ):");
        if (!endTime) return;
        
        const response = await fetch(`${API_URL}/api/bookings/reschedule`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                booking_id: bookingId,
                manager_id: currentUser.id,
                new_date: newDate,
                new_start_time: newTime,
                new_end_time: endTime
            })
        });
        
        if (response.ok) {
            alert("Время успешно переназначено!");
            loadDashboard();
        } else {
            alert("Ошибка переназначения");
        }
    };
    
    // ========== ЭКСПЕРТ ==========
    async function loadExpertView() {
        const slotsRes = await fetch(`${API_URL}/api/slots?expert_id=${currentUser.id}`);
        let mySlots = await slotsRes.json();
        
        const bookingsRes = await fetch(`${API_URL}/api/bookings?role=expert&user_id=${currentUser.id}`);
        let myBookings = await bookingsRes.json();

        // Сортируем слоты по дате и времени
        mySlots = sortByDateTime(mySlots, 'date', 'start_time');
        // Сортируем записи клиентов по дате и времени
        myBookings = sortByDateTime(myBookings, 'date', 'start_time');
        
        let html = `
            <h2>🕐 Мои слоты</h2>
            <div class="form-group">
                <input type="date" id="new-slot-date">
                <input type="time" id="new-slot-start">
                <input type="time" id="new-slot-end">
                <button onclick="createSlot()">➕ Добавить слот</button>
            </div>
            <table class="data-table"><thead><tr><th>Дата</th><th>Время</th><th>Статус</th><th>Действия</th></tr></thead><tbody>`;
        if (mySlots.length === 0) html += `<tr><td colspan="4">Нет слотов</td></tr>`;
        mySlots.forEach(slot => {
            html += `<tr id="slot-row-${slot.id}">
                <td>${slot.date}</td>
                <td>${slot.start_time} - ${slot.end_time}</td>
                <td><span class="status ${getStatusClass(slot.status)}">${slot.status}</span></td>
                <td class="action-buttons">
                    ${slot.status === 'free' ? `
                        <button class="warning" onclick="editSlot('${slot.id}', '${slot.date}', '${slot.start_time}', '${slot.end_time}')">✏️ Редактировать</button>
                        <button class="danger" onclick="deleteSlot('${slot.id}')">🗑 Удалить</button>
                    ` : '—'}
                </td>
            </tr>`;
        });
        html += `</tbody></table>`;
        
        html += `<hr><h2>📋 Записи клиентов</h2>`;
        if (myBookings.length === 0) html += `<p>Нет записей</p>`;
        else {
            html += `<table class="data-table"><thead><tr>
                <th>Клиент</th><th>Телефон</th><th>Email</th><th>Дата/Время</th><th>Менеджер</th><th>Статус</th><th>Комментарий</th><th>Изменить статус</th>
            </tr></thead><tbody>`;
            myBookings.forEach(b => {
                html += `<tr id="expert-booking-${b.id}">
                    <td><strong>${b.client_name}</strong></td>
                    <td>${b.client_phone || '—'}</td>
                    <td>${b.client_email || '—'}</td>
                    <td>${b.date} ${b.start_time}</td>
                    <td>${b.manager_name || '—'}</td>
                    <td><span class="status ${getStatusClass(b.call_status)}">${getStatusName(b.call_status)}</span></td>
                    <td>${b.call_comment || '—'}</td>
                    <td>
                        <select id="status-select-${b.id}" onchange="onStatusChange('${b.id}', this.value)">
                            <option value="pending" ${b.call_status === 'pending' ? 'selected' : ''}>⏳ Ожидает</option>
                            <option value="confirmed" ${b.call_status === 'confirmed' ? 'selected' : ''}>✅ Подтверждён</option>
                            <option value="success" ${b.call_status === 'success' ? 'selected' : ''}>🎉 Созвон успешный</option>
                            <option value="cancelled_by_client" ${b.call_status === 'cancelled_by_client' ? 'selected' : ''}>❌ Отменён клиентом</option>
                            <option value="cancelled_by_expert" ${b.call_status === 'cancelled_by_expert' ? 'selected' : ''}>⚠️ Отменён экспертом</option>
                            <option value="failed" ${b.call_status === 'failed' ? 'selected' : ''}>💔 Созвон не успешный</option>
                            <option value="reschedule_request" ${b.call_status === 'reschedule_request' ? 'selected' : ''}>🔄 Клиент просил перенести</option>
                        </select>
                    </td>
                </tr>`;
            });   
            html += `</tbody></table>`;
        }
        dashboardDiv.innerHTML = html;
    }
    
    window.onStatusChange = (bookingId, newStatus) => {
        showStatusModal(bookingId, newStatus, (success) => {
            if (success) {
                console.log('Status updated');
            }
        });
    };
    
    window.createSlot = async () => {
        const date = document.getElementById('new-slot-date').value;
        const start = document.getElementById('new-slot-start').value;
        const end = document.getElementById('new-slot-end').value;
        
        if (!date || !start || !end) {
            alert("Заполните дату, начало и конец");
            return;
        }
        
        const response = await fetch(`${API_URL}/api/slots`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                expert_id: currentUser.id,
                date: date,
                start_time: start,
                end_time: end
            })
        });
        
        if (response.ok) {
            alert("Слот создан");
            loadDashboard();
        } else {
            alert("Ошибка создания слота");
        }
    };
    
    window.editSlot = async (slotId, oldDate, oldStart, oldEnd) => {
        const newDate = prompt("Введите новую дату (ГГГГ-ММ-ДД):", oldDate);
        if (!newDate) return;
        const newStart = prompt("Введите новое время начала (ЧЧ:ММ):", oldStart);
        if (!newStart) return;
        const newEnd = prompt("Введите новое время окончания (ЧЧ:ММ):", oldEnd);
        if (!newEnd) return;
        
        const response = await fetch(`${API_URL}/api/slots/${slotId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                expert_id: currentUser.id,
                date: newDate,
                start_time: newStart,
                end_time: newEnd
            })
        });
        
        if (response.ok) {
            alert("Слот обновлён");
            loadDashboard();
        } else {
            alert("Ошибка обновления слота");
        }
    };
    
    window.deleteSlot = async (slotId) => {
        if (!confirm("Удалить этот слот?")) return;
        
        const response = await fetch(`${API_URL}/api/slots/${slotId}?expert_id=${currentUser.id}`, {
            method: 'DELETE'
        });
        
        if (response.ok) {
            alert("Слот удалён");
            loadDashboard();
        } else {
            alert("Ошибка удаления слота");
        }
    };
    
    // ========== АДМИН ==========
    async function loadAdminView() {
        let html = `
            <h2>👑 Административная панель</h2>
            <div class="tabs">
                <div class="tab ${adminActiveTab === 'slots' ? 'active' : ''}" onclick="switchAdminTab('slots')">📅 Слоты экспертов</div>
                <div class="tab ${adminActiveTab === 'bookings' ? 'active' : ''}" onclick="switchAdminTab('bookings')">📋 Все записи</div>
                <div class="tab ${adminActiveTab === 'users' ? 'active' : ''}" onclick="switchAdminTab('users')">👥 Пользователи</div>
            </div>
            <div id="admin-tab-content"></div>
        `;
        dashboardDiv.innerHTML = html;
        
        if (adminActiveTab === 'slots') await renderAdminSlots();
        else if (adminActiveTab === 'bookings') await renderAdminBookings();
        else if (adminActiveTab === 'users') await renderAdminUsers();
    }
    
    window.switchAdminTab = (tab) => {
        adminActiveTab = tab;
        loadAdminView();
    };
    
    async function renderAdminSlots() {
        const usersRes = await fetch(`${API_URL}/api/users`);
        const allUsers = await usersRes.json();
        const experts = allUsers.filter(u => u.role === 'expert' && u.is_active !== false);
        
        const slotsRes = await fetch(`${API_URL}/api/slots/admin/all`);
        let allSlots = await slotsRes.json();

        // Сортируем слоты экспертов
        allSlots = sortByDateTime(allSlots, 'date', 'start_time');
        
        let html = `
            <div class="filter-bar">
                <label>👨‍🏫 Фильтр:</label>
                <select id="expert-filter">
                    <option value="all">Все эксперты</option>
                    ${experts.map(e => `<option value="${e.id}">${e.name}</option>`).join('')}
                </select>
                <button onclick="filterSlots()">🔍 Применить</button>
            </div>
            <table class="data-table">
                <thead><tr><th>Эксперт</th><th>Дата</th><th>Время</th><th>Статус</th><th>Клиент</th><th>Телефон</th><th>Email</th><th>Статус созвона</th><th>Комментарий</th><th>Менеджер</th><th>Zoom</th></tr></thead>
                <tbody id="slots-tbody"></tbody>
            </table>
        `;
        document.getElementById('admin-tab-content').innerHTML = html;
        window.adminSlotsData = allSlots;
        renderSlotsTable(allSlots);
    }
    
    function renderSlotsTable(slots) {
        const tbody = document.getElementById('slots-tbody');
        if (!tbody) return;
        if (slots.length === 0) {
            tbody.innerHTML = '<tr><td colspan="11">Нет слотов</td></tr>';
            return;
        }
        tbody.innerHTML = slots.map(slot => `
            <tr>
                <td>${slot.expert_portfolio ? `<a href="${slot.expert_portfolio}" target="_blank" class="clickable-name">${slot.expert_name}</a>` : `<strong>${slot.expert_name}</strong>`}<br><span class="text-muted">${slot.expert_email}</span></td>
                <td>${slot.date}</td>
                <td>${slot.start_time} - ${slot.end_time}</td>
                <td><span class="status ${getStatusClass(slot.status)}">${slot.status}</span></td>
                ${slot.booking ? `
                    <td>${slot.booking.client_name}</td>
                    <td>${slot.booking.client_phone || '—'}</td>
                    <td>${slot.booking.client_email || '—'}</td>
                    <td><span class="status ${getStatusClass(slot.booking.call_status)}">${getStatusName(slot.booking.call_status)}</span></td>
                    <td><span class="comment-preview">${slot.booking.call_comment || '—'}</span></td>
                    <td>${slot.booking.manager_name || '—'}</td>
                    <td><a href="${slot.booking.zoom_link}" target="_blank" class="zoom-link">🔗 Zoom</a></td>
                ` : '<td colspan="7" class="text-muted">— свободен —</td>'}
            </tr>
        `).join('');
    }
    
    window.filterSlots = () => {
        const expertId = document.getElementById('expert-filter').value;
        const slots = window.adminSlotsData || [];
        const filtered = expertId === 'all' ? slots : slots.filter(s => s.expert_id === expertId);
        renderSlotsTable(filtered);
    };
    
    async function renderAdminBookings() {
        const bookingsRes = await fetch(`${API_URL}/api/bookings?role=admin&user_id=${currentUser.id}`);
        let allBookings = await bookingsRes.json();

        // Сортируем все записи
        allBookings = sortByDateTime(allBookings, 'date', 'start_time');

// Сортируем все записи
allBookings = sortByDateTime(allBookings, 'date', 'start_time');
        
        let html = `<table class="data-table">
            <thead><tr><th>Клиент</th><th>Email</th><th>Телефон</th><th>Эксперт</th><th>Дата/Время</th><th>Менеджер</th><th>Статус созвона</th><th>Комментарий</th><th>Zoom</th></tr></thead>
            <tbody>`;
        if (allBookings.length === 0) html += `<tr><td colspan="9">Нет записей</td></tr>`;
        allBookings.forEach(b => {
            html += `<tr>
                <td><strong>${b.client_name}</strong></td>
                <td>${b.client_email || '—'}</td>
                <td>${b.client_phone || '—'}</td>
                <td>${b.expert_portfolio ? `<a href="${b.expert_portfolio}" target="_blank" class="clickable-name">${b.expert_name}</a>` : b.expert_name}</td>
                <td>${b.date} ${b.start_time}</td>
                <td>${b.manager_name || '—'}</td>
                <td><span class="status ${getStatusClass(b.call_status)}">${getStatusName(b.call_status)}</span></td>
                <td><span class="comment-preview">${b.call_comment || '—'}</span></td>
                <td><a href="${b.zoom_link}" target="_blank" class="zoom-link">🔗 Zoom</a></td>
            </tr>`;
        });
        html += `</tbody></table>`;
        document.getElementById('admin-tab-content').innerHTML = html;
    }
    
    async function renderAdminUsers() {
    const usersRes = await fetch(`${API_URL}/api/users`);
    let allUsers = await usersRes.json();
    
    let html = `
        <div style="overflow-x: auto;">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Имя</th><th>Email</th><th>Роль</th><th>Статус</th><th>Визитка</th><th>Действия</th><th>Удалить</th>
                    </tr>
                </thead>
                <tbody id="users-tbody"></tbody>
            </table>
        </div>
        <p class="text-muted" style="margin-top: 1rem;">⚠️ Нельзя удалить или изменить роль последнего администратора.</p>
    `;
    document.getElementById('admin-tab-content').innerHTML = html;
    
    const tbody = document.getElementById('users-tbody');
    tbody.innerHTML = allUsers.map(user => {
        const isActive = user.is_active !== false;
        const portfolioField = user.role === 'expert' 
            ? `<input type="text" id="portfolio-${user.id}" value="${user.portfolio_url || ''}" placeholder="Ссылка на визитку" style="width:150px;">` 
            : '—';
        return `
            <tr>
                <td>${escapeHtml(user.name)}</td>
                <td>${escapeHtml(user.email)}</td>
                <td>
                    <select class="role-select-${user.id}" ${user.id === currentUser.id ? 'disabled' : ''}>
                        <option value="manager" ${user.role === 'manager' ? 'selected' : ''}>Менеджер</option>
                        <option value="expert" ${user.role === 'expert' ? 'selected' : ''}>Эксперт</option>
                        <option value="admin" ${user.role === 'admin' ? 'selected' : ''}>Админ</option>
                    </select>
                </td>
                <td class="${isActive ? 'user-active' : 'user-inactive'}">${isActive ? 'Активен' : 'Заблокирован'}</td>
                <td>${portfolioField}</td>
                <td>
                    <button class="secondary" onclick="updateUser('${user.id}')">💾 Сохранить</button>
                    <button class="warning" onclick="toggleBlockUser('${user.id}', ${!isActive})">${isActive ? '🔒 Блок' : '🔓 Разблок'}</button>
                </td>
                <td>${user.id !== currentUser.id ? `<button class="danger" onclick="deleteUser('${user.id}')">🗑 Удалить</button>` : '<span class="badge">Вы</span>'}</td>
            </tr>
        `;
    }).join('');
}
    
    window.updateUser = async (userId) => {
       const select = document.querySelector(`.role-select-${userId}`);
       if (!select) return;
       const newRole = select.value;
       const portfolioInput = document.getElementById(`portfolio-${userId}`);
       const portfolioUrl = portfolioInput ? portfolioInput.value : "";
    
       if (!confirm(`Изменить роль пользователя на "${newRole}"?`)) return;
    
       const response = await fetch(`${API_URL}/api/users`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ user_id: userId, role: newRole, portfolio_url: portfolioUrl })
       });
    
       if (response.ok) {
        alert("Обновлено!");
        renderAdminUsers();
       } else {
        const error = await response.json();
        alert(error.detail || "Ошибка");
       }
   };

    
    window.toggleBlockUser = async (userId, unblock) => {
        const action = unblock ? 'разблокировать' : 'заблокировать';
        if (!confirm(`Вы уверены, что хотите ${action} этого пользователя?`)) return;
        
        const response = await fetch(`${API_URL}/api/users`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ user_id: userId, is_active: unblock })
        });
        
        if (response.ok) {
            alert(unblock ? "Пользователь разблокирован" : "Пользователь заблокирован");
            renderAdminUsers();
        } else {
            const error = await response.json();
            alert(error.detail || "Ошибка");
        }
    };
    
    window.deleteUser = async (userId) => {
        if (!confirm(`Удалить пользователя? Все его слоты будут удалены.`)) return;
        
        const response = await fetch(`${API_URL}/api/users/${userId}`, {
            method: 'DELETE'
        });
        
        if (response.ok) {
            alert("Пользователь удалён");
            if (currentUser && currentUser.id === userId) {
                clearStorage();
                location.reload();
            } else {
                renderAdminUsers();
            }
        } else {
            const error = await response.json();
            alert(error.detail || "Ошибка удаления");
        }
    };
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // ========== ПОДТВЕРЖДЕНИЕ ЗАПИСИ ЭКСПЕРТОМ ==========
    window.confirmBooking = async (bookingId) => {
        console.log("Подтверждение записи:", bookingId);
        try {
            const response = await fetch(`${API_URL}/api/bookings/confirm`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    booking_id: bookingId,
                    expert_id: currentUser.id
                })
            });
            
            if (response.ok) {
                alert("✅ Запись подтверждена!");
                loadDashboard();
            } else {
                const error = await response.json();
                alert("❌ Ошибка подтверждения: " + (error.detail || "неизвестная ошибка"));
            }
        } catch (err) {
            console.error("Ошибка:", err);
            alert("❌ Ошибка соединения");
        }
    };
    
    // При загрузке проверяем email в поле ввода
    document.getElementById('user-email').addEventListener('input', (e) => {
        checkAdminAccess(e.target.value);
    });
   
    loadFromStorage();
</script>
